name: LLM Shield - Complete DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic pydantic-settings supabase resend pytest httpx bandit python-jose[cryptography] passlib bcrypt

    # --- Test Phase: Custom Python Tests ---
    - name: Run Pytest (Custom Threat Injection & Endpoint Tests)
      env:
        PYTHONPATH: backend
      run: |
        python -m pytest backend/ -v

    # --- DevSecOps SAST: Run Bandit Scanner ---
    - name: Run Bandit (Static Code Security Scan)
      run: |
        bandit -r backend/app/ -f txt -o bandit-report.txt || true

    - name: Upload Bandit Security Report
      uses: actions/upload-artifact@v4
      with:
        name: bandit-security-report
        path: bandit-report.txt