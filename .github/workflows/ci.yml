name: LLM Shield - Complete DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: Build & Python Code Security (SAST)
  # ==========================================
  security-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic pydantic-settings supabase resend pytest httpx bandit python-jose[cryptography] passlib bcrypt

    # --- Test Phase: Custom Python Tests ---
    - name: Run Pytest (Custom Threat Injection & Endpoint Tests)
      env:
        PYTHONPATH: backend
      run: |
        python -m pytest backend/ -v

    # --- DevSecOps SAST: Run Bandit Scanner ---
    - name: Run Bandit (Static Code Security Scan)
      run: |
        bandit -r backend/app/ -f txt -o bandit-report.txt || true

    - name: Upload Bandit Security Report
      uses: actions/upload-artifact@v4
      with:
        name: bandit-security-report
        path: bandit-report.txt

  # ==========================================
  # JOB 2: Dynamic Endpoint Security (DAST)
  # ==========================================
  dast-scan:
    needs: security-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic pydantic-settings supabase resend python-jose[cryptography] passlib bcrypt

    # --- Start FastAPI Local Server for DAST Scanning ---
    - name: Start FastAPI Backend Local Server
      env:
        PYTHONPATH: backend
      run: |
        python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &
        sleep 5

    # --- DevSecOps DAST: Run OWASP ZAP Baseline Scan ---
    - name: OWASP ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.11.0
      with:
        target: 'http://localhost:8000/docs'
        token: ${{ secrets.GITHUB_TOKEN }}
        fail_action: false
        # This parameter forces Docker to run on the host network to reach localhost
        cmd_options: '-z "--network=host"'