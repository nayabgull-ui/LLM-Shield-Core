name: LLM Shield - Complete DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: Build & Python Code Security (SAST)
  # ==========================================
  security-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        # Manually installing your backend requirements so we don't need requirements.txt
        pip install fastapi uvicorn pydantic supabase resend pytest httpx bandit

# -# --- Test Phase: Custom Python Tests ---
    - name: Run Pytest (Custom Threat Injection & Endpoint Tests)
      env:
        PYTHONPATH: backend
      run: |
        python -m pytest backend/ -v
    # --- DevSecOps SAST: Run Bandit Scanner ---
    - name: Run Bandit (Static Code Security Scan)
      # bandit -r checks for SQL injections, hardcoded keys, and command injection risks
      run: |
        bandit -r app/ -f txt -o bandit-report.txt || true

    - name: Upload Bandit Security Report
      uses: actions/upload-artifact@v4
      with:
        name: bandit-security-report
        path: bandit-report.txt

  # ==========================================
  # JOB 2: Dynamic Endpoint Security (DAST)
  # ==========================================
  dast-scan:
    needs: security-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # --- DevSecOps DAST: Run OWASP ZAP Baseline Scan ---
    - name: OWASP ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.11.0
      with:
        # Give ZAP your live deployment URL or local container URL to scan
        target: 'https://your-deployed-api-url.com'
        token: ${{ secrets.GITHUB_TOKEN }}
        fail_action: false