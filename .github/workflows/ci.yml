name: LLM Shield CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your code from GitHub to the cloud runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Docker Environment on the runner
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Create a dummy .env file so Docker Compose doesn't complain about missing files
      - name: Create Temporary .env File
        run: |
          cp .env.example .env

      # Step 4: Spin up the containers using your docker-compose.yml
      - name: Start Containers with Docker Compose
        run: |
          docker compose up -d

      # Step 5: Wait for containers to be fully healthy
      - name: Wait for services to start
        run: sleep 10

      # Step 6: Install test dependencies inside the running container
      - name: Install Testing Tools
        run: |
          docker compose exec -T --user root backend pip install pytest httpx

      # Step 7: Run your test suite!
      - name: Run Test Suite
        run: |
          docker compose exec -T --user root backend pytest app/test_main.py